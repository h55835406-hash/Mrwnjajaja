<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мёд Алтая</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.css" />
    <style>
        body { margin: 0; padding: 0; background-color: #fdf5e6; font-family: 'Segoe UI', sans-serif; color: #5d4037; overflow-x: hidden; padding-bottom: 80px; }
        header { width: 100%; height: 120px; background: url('https://raw.githubusercontent.com/h55835406-hash/Mrwnjajaja/main/headmed.png') no-repeat center bottom; background-size: cover; position: sticky; top: 0; z-index: 100; }
        
        /* ПЧЕЛА - МАРШРУТЫ ИЗ ОРИГИНАЛА */
        .bee-container { position: fixed; width: 40px; z-index: 99; pointer-events: none; animation: fly-zigzag 15s infinite linear; }
        @keyframes fly-zigzag {
            0% { top: 10%; left: -10%; transform: scaleX(1); }
            25% { top: 30%; left: 30%; transform: scaleX(1); }
            50% { top: 10%; left: 110%; transform: scaleX(1); }
            51% { transform: scaleX(-1); }
            75% { top: 50%; left: 50%; transform: scaleX(-1); }
            100% { top: 10%; left: -10%; transform: scaleX(-1); }
        }
        .bubble { position: absolute; bottom: 45px; left: -20px; background: white; border: 2px solid #ffa000; border-radius: 10px; padding: 5px 10px; font-size: 12px; font-weight: bold; display: none; white-space: nowrap; box-shadow: 2px 2px 5px rgba(0,0,0,0.1); transform: scaleX(1) !important; }
        .bubble:after { content: ''; position: absolute; bottom: -10px; left: 20px; border-width: 10px 10px 0; border-style: solid; border-color: #ffa000 transparent; }

        /* КАТАЛОГ */
        .catalog { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 20px; }
        .product-card { background: #fff; border-radius: 15px; padding: 12px; text-align: center; box-shadow: 0 4px 8px rgba(0,0,0,0.05); display: flex; flex-direction: column; }
        .product-card img { width: 100%; border-radius: 10px; }
        .product-title { font-weight: bold; margin: 8px 0 4px; font-size: 0.9em; }
        .desc { font-size: 0.75em; color: #8d6e63; margin-bottom: 8px; flex-grow: 1; }
        .price-tag { color: #ffa000; font-weight: bold; margin-bottom: 5px; }
        .btn-plus-minus { background: #ffa000; color: white; border: none; border-radius: 50%; width: 30px; height: 30px; font-size: 20px; font-weight: bold; cursor: pointer; }

        /* МОДАЛКА И КАРТА */
        #modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 1000; justify-content: center; align-items: center; }
        .modal-content { background: #fff; width: 90%; max-width: 400px; padding: 25px; border-radius: 25px; text-align: center; position: relative; max-height: 90vh; overflow-y: auto; }
        #map { height: 180px; width: 100%; border-radius: 15px; margin: 10px 0; }
        .leaflet-control-attribution { display: none !important; }

        .pay-button-fixed { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); z-index: 999; width: 70px; height: 70px; cursor: pointer; filter: drop-shadow(0 4px 10px rgba(0,0,0,0.3)); }
        .input-field { width: 100%; padding: 12px; border: 2px solid #fdf5e6; border-radius: 12px; box-sizing: border-box; margin-bottom: 10px; outline: none; }
        .order-btn { background: linear-gradient(to right, #4caf50, #45a049); color: white; border: none; padding: 15px; border-radius: 15px; width: 100%; font-size: 1.1em; font-weight: bold; }
        
        #custom-alert, #confirm-dialog { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #fff; padding: 20px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); z-index: 3000; width: 280px; text-align: center; }
    </style>
</head>
<body>

    <div id="custom-alert"></div>
    <div id="confirm-dialog">
        <p id="confirm-text"></p>
        <div style="display:flex; gap:10px; margin-top:15px">
            <button class="order-btn" style="padding:10px" id="confirm-yes">Да</button>
            <button style="background:#f44336; color:white; border:none; padding:10px; border-radius:12px; width:100%" id="confirm-no">Нет</button>
        </div>
    </div>

    <audio id="bee-sound" src="https://raw.githubusercontent.com/h55835406-hash/Mrwnjajaja/main/Voicy__Hi_%20Roblox.mp3"></audio>

    <div class="bee-container" id="bee-main">
        <div id="bee-bubble" class="bubble"></div>
        <img src="https://raw.githubusercontent.com/h55835406-hash/Mrwnjajaja/main/bee.png" style="width: 100%;">
    </div>

    <header></header>
    <img src="https://raw.githubusercontent.com/h55835406-hash/Mrwnjajaja/main/paybut.png" class="pay-button-fixed" onclick="openCart()">

    <div class="catalog" id="catalog-container"></div>

    <div id="modal">
        <div class="modal-content">
            <span style="position:absolute; top:15px; right:20px; font-size:28px; cursor:pointer" onclick="closeCart()">&times;</span>
            <div id="cart-ui">
                <h3 style="margin:0">🍯 Оформление</h3>
                <ul id="cart-list" style="list-style:none; padding:0; text-align:left; font-size:0.9em"></ul>
                <div id="total-amount" style="font-weight:bold; color:#e65100; margin:10px 0"></div>
                <input type="tel" id="user-phone" class="input-field" placeholder="Ваш телефон">
                <div id="map"></div>
                <input type="text" id="address" class="input-field" placeholder="Адрес доставки">
                <button class="order-btn" onclick="askOrder()">🚀 Заказать</button>
            </div>
            <div id="queue-ui" style="display:none">
                <span style="font-weight:bold; color:#f57c00; font-size:1.2em">⏳ Заказ в пути</span>
                <p>Ждите ответа в чате Jivo.</p>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.js"></script>

    <script>
        const PRICE = 100;
        // ПУЛЬТ С ОПИСАНИЯМИ
        const CONFIG_DATA = [
            { id: 1, name: "Горный мёд", info: "Свежий сбор 2026 года", img: "https://raw.githubusercontent.com/h55835406-hash/Mrwnjajaja/main/photo.png" },
            { id: 2, name: "Липовый мёд", info: "Ароматный и полезный", img: "https://raw.githubusercontent.com/h55835406-hash/Mrwnjajaja/main/photo.png" },
            { id: 3, name: "Гречишный", info: "Терпкий темный мёд", img: "https://raw.githubusercontent.com/h55835406-hash/Mrwnjajaja/main/photo.png" },
            { id: 4, name: "Таёжный мёд", info: "Сила дикой природы", img: "https://raw.githubusercontent.com/h55835406-hash/Mrwnjajaja/main/photo.png" },
            { id: 5, name: "Мёд в сотах", info: "Натуральный продукт", img: "https://raw.githubusercontent.com/h55835406-hash/Mrwnjajaja/main/photo.png" },
            { id: 6, name: "Донниковый", info: "Ванильный вкус", img: "https://raw.githubusercontent.com/h55835406-hash/Mrwnjajaja/main/photo.png" },
            { id: 7, name: "Акациевый", info: "Очень нежный вкус", img: "https://raw.githubusercontent.com/h55835406-hash/Mrwnjajaja/main/photo.png" },
            { id: 8, name: "Цветочный", info: "Алтайское разнотравье", img: "https://raw.githubusercontent.com/h55835406-hash/Mrwnjajaja/main/photo.png" },
            { id: 9, name: "Мёд с орехами", info: "Кедровые орешки в меду", img: "https://raw.githubusercontent.com/h55835406-hash/Mrwnjajaja/main/photo.png" },
            { id: 10, name: "Эспарцетовый", info: "Кремовая текстура", img: "https://raw.githubusercontent.com/h55835406-hash/Mrwnjajaja/main/photo.png" },
            { id: 11, name: "Дягилевый", info: "Редкий элитный сорт", img: "https://raw.githubusercontent.com/h55835406-hash/Mrwnjajaja/main/photo.png" },
            { id: 12, name: "Прополис", info: "Природный антибиотик", img: "https://raw.githubusercontent.com/h55835406-hash/Mrwnjajaja/main/photo.png" },
            { id: 13, name: "Перга", info: "Витамины от пчел", img: "https://raw.githubusercontent.com/h55835406-hash/Mrwnjajaja/main/photo.png" },
            { id: 14, name: "Пыльца", info: "Энергия и здоровье", img: "https://raw.githubusercontent.com/h55835406-hash/Mrwnjajaja/main/photo.png" },
            { id: 15, name: "Подарочный набор", info: "Все виды по чуть-чуть", img: "https://raw.githubusercontent.com/h55835406-hash/Mrwnjajaja/main/photo.png" }
        ];

        let cart = {}, map, marker;
        const container = document.getElementById('catalog-container');
        CONFIG_DATA.forEach(p => {
            container.innerHTML += `<div class="product-card"><img src="${p.img}"><div class="product-title">${p.name}</div><div class="desc">${p.info}</div><div class="price-tag">${PRICE} ₽</div><div class="controls"><button class="btn-plus-minus" onclick="updateCart('${p.name}',-1,${p.id})">-</button> <span id="q-${p.id}">0</span> <button class="btn-plus-minus" onclick="updateCart('${p.name}',1,${p.id})">+</button></div></div>`;
        });

        function showA(t) { const e = document.getElementById('custom-alert'); e.innerText = t; e.style.display='block'; setTimeout(()=>e.style.display='none',3000); }
        function askOrder() {
            const p = document.getElementById('user-phone').value;
            const a = document.getElementById('address').value;
            if(!p || !a) return showA("Заполните данные!");
            const d = document.getElementById('confirm-dialog');
            document.getElementById('confirm-text').innerText = "Оформить заказ?";
            d.style.display='block';
            document.getElementById('confirm-yes').onclick = () => { d.style.display='none'; sendOrder(p, a); };
            document.getElementById('confirm-no').onclick = () => d.style.display='none';
        }

        function updateCart(n, c, i) { cart[n] = (cart[n] || 0) + c; if (cart[n] < 0) cart[n] = 0; document.getElementById(`q-${i}`).innerText = cart[n]; }

        function initMap() {
            if (map) return;
            map = L.map('map').setView([53.3, 83.7], 11);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
            L.Control.geocoder({ defaultMarkGeocode: false }).on('markgeocode', e => {
                if (marker) map.removeLayer(marker);
                marker = L.marker(e.geocode.center).addTo(map);
                map.fitBounds(e.geocode.bbox);
                document.getElementById('address').value = e.geocode.name;
            }).addTo(map);
            map.on('click', async e => {
                if (marker) map.removeLayer(marker);
                marker = L.marker(e.latlng).addTo(map);
                const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${e.latlng.lat}&lon=${e.latlng.lng}&accept-language=ru`);
                const data = await res.json();
                document.getElementById('address').value = data.display_name || "Точка на карте";
            });
            setTimeout(() => map.invalidateSize(), 200);
        }

        function openCart() {
            const list = document.getElementById('cart-list'); list.innerHTML = ''; let total = 0, empty = true;
            for (let i in cart) if (cart[i] > 0) { list.innerHTML += `<li>${i}: <b>${cart[i]} шт.</b></li>`; total += cart[i] * PRICE; empty = false; }
            if (empty) return showA("Корзина пуста!");
            document.getElementById('total-amount').innerText = `Итого: ${total} ₽`;
            document.getElementById('modal').style.display = 'flex'; initMap();
        }

        function sendOrder(p, a) {
            let info = `🐝 ЗАКАЗ:\n📞 Тел: ${p}\n📍 Адрес: ${a}\n💰 Сумма: ${document.getElementById('total-amount').innerText}`;
            if (window.jivo_api) { jivo_api.sendMessage(info); document.getElementById('cart-ui').style.display='none'; document.getElementById('queue-ui').style.display='block'; }
        }

        function closeCart() { document.getElementById('modal').style.display = 'none'; }
        
        // Пчелиный треп
        const phrases = ["Привет!", "Мёда хочешь?", "Покупай!"];
        function beeSpeak() { 
            const b = document.getElementById('bee-bubble'); 
            b.innerText = phrases[Math.floor(Math.random()*phrases.length)];
            b.style.display='block'; 
            document.getElementById('bee-sound').play().catch(()=>{});
            setTimeout(()=>{ b.style.display='none'; setTimeout(beeSpeak, 5000); }, 5000);
        }
        setTimeout(beeSpeak, 2000);
    </script>
    <script src="//code.jivo.ru/widget/Z195zgvWNH" async></script>
</body>
</html>

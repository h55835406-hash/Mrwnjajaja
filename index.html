<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мёд Алтая — Натуральный продукт</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body {
            margin: 0; padding: 0;
            background-color: #fdf5e6;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #5d4037;
            overflow-x: hidden;
        }

        header {
            width: 100%; height: 120px;
            background: url('https://raw.githubusercontent.com/h55835406-hash/Mrwnjajaja/main/headmed.png') no-repeat center bottom;
            background-size: cover;
            position: sticky; top: 0; z-index: 100;
            display: flex; justify-content: center; align-items: center; padding-top: 10px;
        }

        header img { width: 50px; height: 50px; cursor: pointer; transition: transform 0.3s ease; }

        .bee-container { position: fixed; width: 40px; z-index: 99; pointer-events: none; animation: fly-zigzag 15s infinite linear; }
        @keyframes fly-zigzag {
            0% { top: 10%; left: -10%; transform: scaleX(1); }
            25% { top: 30%; left: 30%; transform: scaleX(1); }
            50% { top: 10%; left: 110%; transform: scaleX(1); }
            51% { transform: scaleX(-1); }
            75% { top: 50%; left: 50%; transform: scaleX(-1); }
            100% { top: 10%; left: -10%; transform: scaleX(-1); }
        }
        .bubble {
            position: absolute; bottom: 45px; left: -20px;
            background: white; border: 2px solid #ffa000; border-radius: 10px;
            padding: 5px 10px; font-size: 12px; font-weight: bold;
            display: none; white-space: nowrap; color: #5d4037;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.1);
        }

        .catalog { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 20px; margin-top: 20px; }
        .product-card {
            background: #fff; border-radius: 15px; padding: 12px;
            text-align: center; box-shadow: 0 4px 8px rgba(0,0,0,0.05);
            display: flex; flex-direction: column; justify-content: space-between;
        }
        .product-card img { width: 100%; border-radius: 10px; }
        .product-title { font-weight: bold; margin: 5px 0; font-size: 0.9em; }
        .price-tag { color: #ffa000; font-weight: bold; margin: 5px 0; }
        .controls { display: flex; justify-content: center; align-items: center; gap: 15px; }
        .btn-plus-minus {
            background: #ffa000; color: white; border: none; border-radius: 50%;
            width: 30px; height: 30px; font-size: 20px; font-weight: bold; cursor: pointer;
        }

        #modal {
            display: none; position: fixed; top: 0; left: 0;
            width: 100%; height: 100%; background: rgba(0,0,0,0.7);
            z-index: 1000; justify-content: center; align-items: center;
        }
        .modal-content {
            background: #fff; width: 90%; max-width: 400px; padding: 25px;
            border-radius: 25px; text-align: center; position: relative;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            max-height: 90vh; overflow-y: auto;
        }
        .close-btn { position: absolute; top: 15px; right: 20px; font-size: 28px; cursor: pointer; color: #8d6e63; }
        
        #cart-list { list-style: none; padding: 0; text-align: left; margin: 15px 0; border-top: 1px dashed #ffa000; padding-top: 10px; }
        #cart-list li { display: flex; justify-content: space-between; margin-bottom: 5px; font-size: 0.95em; }

        #map { height: 180px; width: 100%; border-radius: 15px; margin: 15px 0; border: 2px solid #fdf5e6; }
        
        /* Прячем водяной знак Leaflet */
        .leaflet-control-attribution { display: none !important; }

        .address-input {
            width: 100%; padding: 12px; border: 2px solid #fdf5e6; border-radius: 12px;
            box-sizing: border-box; font-size: 0.9em; margin-bottom: 15px; outline: none;
            background: #fffaf0;
        }
        .address-input:focus { border-color: #ffa000; }

        .total-price { font-size: 1.3em; font-weight: bold; color: #e65100; margin: 15px 0; }
        
        .order-btn {
            background: linear-gradient(to right, #4caf50, #45a049);
            color: white; border: none; padding: 15px; border-radius: 15px;
            width: 100%; font-size: 1.1em; font-weight: bold; cursor: pointer;
        }

        .status-msg { font-size: 1.2em; font-weight: bold; color: #f57c00; display: block; margin: 20px 0; }
        .cancel-btn {
            background: #f44336; color: white; border: none; padding: 10px;
            border-radius: 12px; width: 100%; font-weight: bold; cursor: pointer; margin-top: 10px;
        }
    </style>
</head>
<body>

    <audio id="bee-sound" src="https://raw.githubusercontent.com/h55835406-hash/Mrwnjajaja/main/Voicy__Hi_%20Roblox.mp3"></audio>

    <div class="bee-container" id="bee-main">
        <div id="bee-bubble" class="bubble"></div>
        <img src="https://raw.githubusercontent.com/h55835406-hash/Mrwnjajaja/main/bee.png" style="width: 100%;">
    </div>

    <header>
        <img src="https://raw.githubusercontent.com/h55835406-hash/Mrwnjajaja/main/paybut.png" onclick="openCart()">
    </header>

    <div class="catalog" id="catalog-container"></div>

    <div id="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeCart()">&times;</span>
            <div id="cart-ui">
                <h3 style="margin-top:0;">🍯 Оформление заказа</h3>
                <ul id="cart-list"></ul>
                <div id="checkout-area">
                    <div class="total-price" id="total-amount">Итого: 0 ₽</div>
                    <div id="map"></div>
                    <input type="text" id="address" class="address-input" placeholder="Кликните на карту для адреса">
                    <button class="order-btn" onclick="sendOrder()">🚀 Заказать</button>
                </div>
            </div>
            <div id="queue-ui" style="display:none;">
                <span class="status-msg">⏳ Ожидаем подтверждения</span>
                <p style="font-size: 0.9em; color: #666;">Оператор ответит вам в чате Jivo.</p>
                <button class="cancel-btn" onclick="cancelOrder()">Отменить</button>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const PRICE = 100;
        const CONFIG_DATA = [
            { id: 1, name: "Горный мёд", img: "https://raw.githubusercontent.com/h55835406-hash/Mrwnjajaja/main/photo.png" },
            { id: 2, name: "Липовый мёд", img: "https://raw.githubusercontent.com/h55835406-hash/Mrwnjajaja/main/photo.png" },
            { id: 3, name: "Гречишный", img: "https://raw.githubusercontent.com/h55835406-hash/Mrwnjajaja/main/photo.png" },
            { id: 4, name: "Таёжный мёд", img: "https://raw.githubusercontent.com/h55835406-hash/Mrwnjajaja/main/photo.png" },
            { id: 5, name: "Мёд в сотах", img: "https://raw.githubusercontent.com/h55835406-hash/Mrwnjajaja/main/photo.png" },
            { id: 6, name: "Донниковый", img: "https://raw.githubusercontent.com/h55835406-hash/Mrwnjajaja/main/photo.png" },
            { id: 7, name: "Акациевый", img: "https://raw.githubusercontent.com/h55835406-hash/Mrwnjajaja/main/photo.png" },
            { id: 8, name: "Цветочный", img: "https://raw.githubusercontent.com/h55835406-hash/Mrwnjajaja/main/photo.png" },
            { id: 9, name: "Мёд с орехами", img: "https://raw.githubusercontent.com/h55835406-hash/Mrwnjajaja/main/photo.png" },
            { id: 10, name: "Эспарцетовый", img: "https://raw.githubusercontent.com/h55835406-hash/Mrwnjajaja/main/photo.png" },
            { id: 11, name: "Дягилевый", img: "https://raw.githubusercontent.com/h55835406-hash/Mrwnjajaja/main/photo.png" },
            { id: 12, name: "Прополис", img: "https://raw.githubusercontent.com/h55835406-hash/Mrwnjajaja/main/photo.png" },
            { id: 13, name: "Перга", img: "https://raw.githubusercontent.com/h55835406-hash/Mrwnjajaja/main/photo.png" },
            { id: 14, name: "Пыльца", img: "https://raw.githubusercontent.com/h55835406-hash/Mrwnjajaja/main/photo.png" },
            { id: 15, name: "Подарочный набор", img: "https://raw.githubusercontent.com/h55835406-hash/Mrwnjajaja/main/photo.png" }
        ];

        let cart = {};
        let isOrderQueued = false;
        let isOrderAccepted = false;
        let map, marker;

        const container = document.getElementById('catalog-container');
        CONFIG_DATA.forEach(p => {
            container.innerHTML += `
                <div class="product-card">
                    <img src="${p.img}">
                    <div class="product-title">${p.name}</div>
                    <div class="price-tag">${PRICE} ₽</div>
                    <div class="controls">
                        <button class="btn-plus-minus" onclick="updateCart('${p.name}', -1, ${p.id})">-</button>
                        <span id="q-${p.id}">0</span>
                        <button class="btn-plus-minus" onclick="updateCart('${p.name}', 1, ${p.id})">+</button>
                    </div>
                </div>`;
        });

        function updateCart(n, c, i) {
            if(isOrderQueued) return;
            cart[n] = (cart[n] || 0) + c;
            if (cart[n] < 0) cart[n] = 0;
            document.getElementById(`q-${i}`).innerText = cart[n];
        }

        function initMap() {
            if (!map) {
                map = L.map('map').setView([53.3, 83.7], 11); 
                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
                map.on('click', async function(e) {
                    if (marker) map.removeLayer(marker);
                    marker = L.marker(e.latlng).addTo(map);
                    
                    // Превращаем координаты в адрес
                    try {
                        const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${e.latlng.lat}&lon=${e.latlng.lng}&accept-language=ru`);
                        const data = await res.json();
                        document.getElementById('address').value = data.display_name;
                    } catch (err) {
                        document.getElementById('address').value = `${e.latlng.lat.toFixed(5)}, ${e.latlng.lng.toFixed(5)}`;
                    }
                });
            }
            setTimeout(() => map.invalidateSize(), 200);
        }

        function openCart() {
            if(isOrderQueued) {
                document.getElementById('cart-ui').style.display = 'none';
                document.getElementById('queue-ui').style.display = 'block';
            } else {
                const list = document.getElementById('cart-list');
                list.innerHTML = '';
                let total = 0, empty = true;
                for (let item in cart) {
                    if (cart[item] > 0) {
                        list.innerHTML += `<li><span>${item}</span> <b>${cart[item]} шт.</b></li>`;
                        total += cart[item] * PRICE;
                        empty = false;
                    }
                }
                if (empty) return alert("Корзина пуста!");
                document.getElementById('total-amount').innerText = `Итого: ${total} ₽`;
                document.getElementById('cart-ui').style.display = 'block';
                document.getElementById('queue-ui').style.display = 'none';
                initMap();
            }
            document.getElementById('modal').style.display = 'flex';
        }

        function sendOrder() {
            const addr = document.getElementById('address').value;
            if(!addr) return alert('Выберите адрес на карте!');
            
            let info = "🍯 ЗАКАЗ:\n";
            for (let i in cart) if(cart[i]>0) info += `${i}: ${cart[i]}шт.\n`;
            info += `📍 Адрес: ${addr}\n💰 Сумма: ${document.getElementById('total-amount').innerText}`;

            if (window.jivo_api) {
                jivo_api.sendMessage(info);
                isOrderQueued = true;
                openCart();
            } else { alert('Чат загружается...'); }
        }

        function jivo_onMessage(data) {
            let t = data.text.toLowerCase();
            if (t.includes("принят") || t.includes("ок")) {
                isOrderAccepted = true;
                document.querySelector('.status-msg').innerText = "✅ Заказ принят!";
                document.querySelector('.status-msg').style.color = "#4caf50";
                document.querySelector('.cancel-btn').style.display = "none";
            }
            if (t.includes("отменен") || t.includes("отклонен")) { resetAll(); }
        }

        function resetAll() {
            isOrderQueued = false; cart = {};
            CONFIG_DATA.forEach(p => document.getElementById(`q-${p.id}`).innerText = "0");
            closeCart();
        }

        function cancelOrder() {
            if(confirm("Отменить?")) {
                if (window.jivo_api) jivo_api.sendMessage("❌ Отмена заказа");
                resetAll();
            }
        }
        function closeCart() { document.getElementById('modal').style.display = 'none'; }
    </script>
    <script src="//code.jivo.ru/widget/Z195zgvWNH" async></script>
</body>
</html>

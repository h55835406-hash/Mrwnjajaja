<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мёд Алтая</title>
    <style>
        body { margin: 0; padding: 0; background-color: #fdf5e6; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; color: #5d4037; overflow-x: hidden; }
        header { width: 100%; height: 120px; background: url('https://raw.githubusercontent.com/h55835406-hash/Mrwnjajaja/main/headmed.png') no-repeat center bottom; background-size: cover; position: sticky; top: 0; z-index: 100; display: flex; justify-content: space-around; align-items: center; padding-top: 10px; }
        header img { width: 50px; height: 50px; cursor: pointer; transition: transform 0.3s ease; }
        header img:active { transform: scale(0.9); }
        .bee-container { position: fixed; width: 40px; z-index: 90; pointer-events: none; animation: fly-zigzag 15s infinite linear; }
        @keyframes fly-zigzag { 0% { top: 10%; left: -10%; transform: scaleX(1); } 25% { top: 30%; left: 30%; transform: scaleX(1); } 50% { top: 10%; left: 110%; transform: scaleX(1); } 51% { transform: scaleX(-1); } 75% { top: 50%; left: 50%; transform: scaleX(-1); } 100% { top: 10%; left: -10%; transform: scaleX(-1); } }
        .bubble { position: absolute; bottom: 45px; left: -20px; background: white; border: 2px solid #ffa000; border-radius: 10px; padding: 5px 10px; font-size: 12px; font-weight: bold; display: none; white-space: nowrap; color: #5d4037; box-shadow: 2px 2px 5px rgba(0,0,0,0.1); }
        .bubble:after { content: ''; position: absolute; bottom: -10px; left: 20px; border-width: 10px 10px 0; border-style: solid; border-color: #ffa000 transparent; }
        .catalog { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 20px; margin-top: 20px; }
        .product-card { background: #fff; border-radius: 15px; padding: 12px; text-align: center; box-shadow: 0 4px 8px rgba(0,0,0,0.05); display: flex; flex-direction: column; justify-content: space-between; height: auto; }
        .product-card img { width: 100%; border-radius: 10px; }
        .product-title { font-weight: bold; margin: 5px 0; color: #5d4037; }
        .desc { font-size: 0.85em; color: #8d6e63; margin-bottom: 5px; flex-grow: 1; }
        .price-tag { color: #ffa000; font-weight: bold; margin-bottom: 8px; }
        .controls { display: flex; justify-content: center; align-items: center; gap: 15px; margin: 5px 0; }
        .btn { background: #ffa000; color: white; border: none; border-radius: 50%; width: 30px; height: 30px; font-size: 20px; font-weight: bold; cursor: pointer; }
        #modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 2000; justify-content: center; align-items: center; }
        .modal-content { background: #fff; width: 85%; padding: 20px; border-radius: 20px; text-align: center; position: relative; }
        .close-btn { position: absolute; top: 10px; right: 15px; font-size: 25px; cursor: pointer; }
        #cart-list { list-style: none; padding: 0; text-align: left; max-height: 150px; overflow-y: auto; border-bottom: 1px solid #eee; margin-bottom: 10px; }
        .total-price { font-weight: bold; font-size: 1.2em; color: #e65100; margin: 15px 0; }
        .address-input { width: 90%; padding: 10px; margin: 10px 0; border: 2px solid #fdf5e6; border-radius: 10px; background: #fffaf0; font-family: inherit; }
        .order-btn { background: #4caf50; color: white; border: none; padding: 12px; border-radius: 10px; font-weight: bold; cursor: pointer; width: 100%; font-size: 1.1em; }
        .support-btn { background: #2196f3; color: white; border: none; padding: 8px 15px; border-radius: 10px; font-size: 0.9em; cursor: pointer; margin-top: 15px; }
        /* Новые стили для очереди */
        .cancel-btn { background: #e53935; color: white; border: none; padding: 10px; border-radius: 10px; width: 100%; font-weight: bold; margin-top: 10px; cursor: pointer; }
        .status-msg { color: #f57c00; font-weight: bold; font-size: 1.1em; margin-bottom: 10px; display: block; }
    </style>
</head>
<body>

    <audio id="bee-sound" src="https://raw.githubusercontent.com/h55835406-hash/Mrwnjajaja/main/Voicy__Hi_%20Roblox.mp3"></audio>

    <div class="bee-container" id="bee-main">
        <div id="bee-bubble" class="bubble"></div>
        <img src="https://raw.githubusercontent.com/h55835406-hash/Mrwnjajaja/main/bee.png" style="width: 100%;">
    </div>

    <header>
        <img src="https://raw.githubusercontent.com/h55835406-hash/Mrwnjajaja/main/korzinkabut.png" onclick="alert('Каталог обновлен!')">
        <img src="https://raw.githubusercontent.com/h55835406-hash/Mrwnjajaja/main/paybut.png" onclick="openCart()">
    </header>

    <div class="catalog" id="catalog-container"></div>

    <div id="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeCart()">&times;</span>
            
            <div id="cart-ui">
                <h3 style="margin-top: 0;">Оформление заказа</h3>
                <ul id="cart-list"></ul>
                <div id="checkout-area">
                    <div class="total-price" id="total-amount">Итого: 0 руб.</div>
                    <input type="text" id="address" class="address-input" placeholder="Адрес доставки">
                    <p style="font-size: 0.85em; color: #8d6e63;">Оплата: Наличными курьеру</p>
                    <button class="order-btn" onclick="sendOrder()">Заказать</button>
                </div>
            </div>

            <div id="queue-ui" style="display:none;">
                <span class="status-msg">⏳ Ваш заказ в очереди</span>
                <p style="font-size: 0.9em;">Ожидайте подтверждения в чате поддержки</p>
                <button class="cancel-btn" onclick="cancelOrder()">Отменить заказ</button>
            </div>

            <button class="support-btn" onclick="jivo_api.open();">Написать в поддержку</button>
        </div>
    </div>

    <script>
        const PRICE = 100;
        const CONFIG_DATA = [
            { id: 1, name: "Горный мёд", info: "Свежий сбор 2026 года", img: "https://raw.githubusercontent.com/h55835406-hash/Mrwnjajaja/main/photo.png" },
            { id: 2, name: "Липовый мёд", info: "Ароматный и полезный", img: "https://raw.githubusercontent.com/h55835406-hash/Mrwnjajaja/main/photo.png" },
            { id: 3, name: "Гречишный", info: "Терпкий темный мёд", img: "https://raw.githubusercontent.com/h55835406-hash/Mrwnjajaja/main/photo.png" },
            { id: 4, name: "Таёжный мёд", info: "Сила дикой природы", img: "https://raw.githubusercontent.com/h55835406-hash/Mrwnjajaja/main/photo.png" },
            { id: 5, name: "Мёд в сотах", info: "Натуральный продукт", img: "https://raw.githubusercontent.com/h55835406-hash/Mrwnjajaja/main/photo.png" },
            { id: 6, name: "Донниковый", info: "Ванильный вкус", img: "https://raw.githubusercontent.com/h55835406-hash/Mrwnjajaja/main/photo.png" },
            { id: 7, name: "Акациевый", info: "Очень нежный вкус", img: "https://raw.githubusercontent.com/h55835406-hash/Mrwnjajaja/main/photo.png" },
            { id: 8, name: "Цветочный", info: "Алтайское разнотравье", img: "https://raw.githubusercontent.com/h55835406-hash/Mrwnjajaja/main/photo.png" },
            { id: 9, name: "Мёд с орехами", info: "Кедровые орешки в меду", img: "https://raw.githubusercontent.com/h55835406-hash/Mrwnjajaja/main/photo.png" },
            { id: 10, name: "Эспарцетовый", info: "Кремовая текстура", img: "https://raw.githubusercontent.com/h55835406-hash/Mrwnjajaja/main/photo.png" },
            { id: 11, name: "Дягилевый", info: "Редкий элитный сорт", img: "https://raw.githubusercontent.com/h55835406-hash/Mrwnjajaja/main/photo.png" },
            { id: 12, name: "Прополис", info: "Природный антибиотик", img: "https://raw.githubusercontent.com/h55835406-hash/Mrwnjajaja/main/photo.png" },
            { id: 13, name: "Перга", info: "Витамины от пчел", img: "https://raw.githubusercontent.com/h55835406-hash/Mrwnjajaja/main/photo.png" },
            { id: 14, name: "Пыльца", info: "Энергия и здоровье", img: "https://raw.githubusercontent.com/h55835406-hash/Mrwnjajaja/main/photo.png" },
            { id: 15, name: "Подарочный набор", info: "Все виды по чуть-чуть", img: "https://raw.githubusercontent.com/h55835406-hash/Mrwnjajaja/main/photo.png" }
        ];

        const container = document.getElementById('catalog-container');
        CONFIG_DATA.forEach(p => {
            container.innerHTML += `
                <div class="product-card">
                    <img src="${p.img}">
                    <div class="product-title">${p.name}</div>
                    <div class="desc">${p.info}</div>
                    <div class="price-tag">${PRICE} ₽</div>
                    <div class="controls">
                        <button class="btn" onclick="updateCart('${p.name}', -1, ${p.id})">-</button>
                        <span id="q-${p.id}">0</span>
                        <button class="btn" onclick="updateCart('${p.name}', 1, ${p.id})">+</button>
                    </div>
                </div>`;
        });

        let cart = {};
        let isOrderQueued = false; // Блокировка корзины
        const phrases = ["Привет!", "Выбирай лучший мёд!", "Покупай!"];
        const bubble = document.getElementById('bee-bubble');
        const sound = document.getElementById('bee-sound');
        const beeBox = document.getElementById('bee-main');

        function autoFixText() {
            const matrix = new WebKitCSSMatrix(window.getComputedStyle(beeBox).transform);
            bubble.style.transform = (matrix.a < 0) ? 'scaleX(-1)' : 'scaleX(1)';
            requestAnimationFrame(autoFixText);
        }
        autoFixText();

        function beeSpeak() {
            bubble.innerText = phrases[Math.floor(Math.random() * phrases.length)];
            bubble.style.display = 'block';
            sound.play().catch(() => {});
            setTimeout(() => {
                bubble.style.display = 'none';
                setTimeout(beeSpeak, 6000);
            }, 4000);
        }
        setTimeout(beeSpeak, 3000);

        function updateCart(n, c, i) {
            if(isOrderQueued) return alert("Заказ уже в обработке!");
            cart[n] = (cart[n] || 0) + c;
            if (cart[n] < 0) cart[n] = 0;
            document.getElementById(`q-${i}`).innerText = cart[n];
        }

        function openCart() {
            if(isOrderQueued) {
                document.getElementById('cart-ui').style.display = 'none';
                document.getElementById('queue-ui').style.display = 'block';
            } else {
                const list = document.getElementById('cart-list');
                const totalDisplay = document.getElementById('total-amount');
                list.innerHTML = '';
                let total = 0, empty = true;

                for (let item in cart) {
                    if (cart[item] > 0) {
                        list.innerHTML += `<li>${item} — ${cart[item]} шт.</li>`;
                        total += cart[item] * PRICE;
                        empty = false;
                    }
                }
                if (empty) {
                    list.innerHTML = '<li>Корзина пуста</li>';
                    document.getElementById('checkout-area').style.display = 'none';
                } else {
                    document.getElementById('checkout-area').style.display = 'block';
                    totalDisplay.innerText = `Итого: ${total} руб.`;
                }
                document.getElementById('cart-ui').style.display = 'block';
                document.getElementById('queue-ui').style.display = 'none';
            }
            document.getElementById('modal').style.display = 'flex';
        }

        function sendOrder() {
            const addr = document.getElementById('address').value;
            if(!addr) return alert('Пожалуйста, укажите адрес!');
            
            let orderInfo = "🍯 НОВЫЙ ЗАКАЗ:\n";
            for (let i in cart) if(cart[i] > 0) orderInfo += `${i}: ${cart[i]}шт.\n`;
            orderInfo += `📍 Адрес: ${addr}\n💰 ${document.getElementById('total-amount').innerText}`;

            if (typeof jivo_api !== 'undefined') {
                jivo_api.sendMessage(orderInfo);
                isOrderQueued = true;
                openCart();
            } else {
                alert('Чат поддержки еще не загружен. Подождите пару секунд.');
            }
        }

        function cancelOrder() {
            if(confirm("Отменить текущий заказ?")) {
                if (typeof jivo_api !== 'undefined') jivo_api.sendMessage("❌ Клиент отменил заказ");
                isOrderQueued = false;
                cart = {};
                CONFIG_DATA.forEach(p => document.getElementById(`q-${p.id}`).innerText = "0");
                closeCart();
            }
        }

        function closeCart() { document.getElementById('modal').style.display = 'none'; }
    </script>
</body>
</html>

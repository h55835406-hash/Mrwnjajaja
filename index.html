<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мёд Алтая</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #fdf5e6; /* Молочно-телесный фон */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #5d4037;
            overflow-x: hidden;
        }

        /* Шапка сайта */
        header {
            width: 100%;
            height: 120px;
            background: url('https://raw.githubusercontent.com/h55835406-hash/Mrwnjajaja/main/headmed.png') no-repeat center bottom;
            background-size: cover;
            position: sticky;
            top: 0;
            z-index: 100;
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding-top: 10px;
        }

        header img {
            width: 50px;
            height: 50px;
            cursor: pointer;
            transition: transform 0.3s ease;
        }

        header img:active {
            transform: scale(0.9);
        }

        /* Анимированная пчелка */
        .bee-container {
            position: fixed;
            width: 40px;
            z-index: 99;
            pointer-events: none;
            animation: fly 10s infinite linear;
        }

        @keyframes fly {
            0% { top: 20%; left: -10%; transform: scaleX(1); }
            45% { top: 50%; left: 110%; transform: scaleX(1); }
            50% { transform: scaleX(-1); }
            95% { top: 80%; left: -10%; transform: scaleX(-1); }
            100% { left: -10%; transform: scaleX(1); }
        }

        /* Облачко с текстом */
        .bubble {
            position: absolute;
            bottom: 45px;
            left: -20px;
            background: white;
            border: 2px solid #ffa000;
            border-radius: 10px;
            padding: 5px 10px;
            font-size: 12px;
            font-weight: bold;
            display: none;
            white-space: nowrap;
            color: #5d4037;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.1);
        }

        .bubble:after {
            content: '';
            position: absolute;
            bottom: -10px;
            left: 20px;
            border-width: 10px 10px 0;
            border-style: solid;
            border-color: #ffa000 transparent;
        }

        /* Сетка товаров */
        .catalog {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            padding: 20px;
            margin-top: 20px;
        }

        .product-card {
            background: #fff;
            border-radius: 15px;
            padding: 10px;
            text-align: center;
            box-shadow: 0 4px 8px rgba(0,0,0,0.05);
        }

        .product-card img {
            width: 100%;
            border-radius: 10px;
        }

        .controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            margin: 10px 0;
        }

        .btn {
            background: #ffa000;
            color: white;
            border: none;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
        }

        .desc {
            font-size: 0.9em;
            color: #8d6e63;
        }

        /* Модальное окно */
        #modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.6);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: #fff;
            width: 85%;
            padding: 20px;
            border-radius: 20px;
            text-align: center;
            position: relative;
        }

        .close-btn {
            position: absolute;
            top: 10px; right: 15px;
            font-size: 25px;
            cursor: pointer;
        }

        #cart-list {
            list-style: none;
            padding: 0;
            text-align: left;
            max-height: 200px;
            overflow-y: auto;
        }

        .phone-num {
            font-size: 1.2em;
            font-weight: bold;
            color: #e65100;
            display: block;
            margin: 15px 0;
        }
    </style>
</head>
<body>

    <audio id="bee-sound" src="https://raw.githubusercontent.com/h55835406-hash/Mrwnjajaja/main/Voicy__Hi_%20Roblox.mp3"></audio>

    <div class="bee-container">
        <div id="bee-bubble" class="bubble"></div>
        <img src="https://raw.githubusercontent.com/h55835406-hash/Mrwnjajaja/main/bee.png" style="width: 100%;">
    </div>

    <header>
        <img src="https://raw.githubusercontent.com/h55835406-hash/Mrwnjajaja/main/korzinkabut.png" onclick="alert('Каталог обновлен!')">
        <img src="https://raw.githubusercontent.com/h55835406-hash/Mrwnjajaja/main/paybut.png" onclick="openCart()">
    </header>

    <div class="catalog">
        <script>
            for(let i=1; i<=4; i++) {
                document.write(`
                    <div class="product-card">
                        <img src="https://raw.githubusercontent.com/h55835406-hash/Mrwnjajaja/main/photo.png">
                        <div class="controls">
                            <button class="btn" onclick="updateCart('Товар ${i}', -1)">-</button>
                            <span id="q-${i}">0</span>
                            <button class="btn" onclick="updateCart('Товар ${i}', 1)">+</button>
                        </div>
                        <p class="desc">ваш текст здесь</p>
                    </div>
                `);
            }
        </script>
    </div>

    <div id="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeCart()">&times;</span>
            <h3>Ваш заказ:</h3>
            <ul id="cart-list"></ul>
            <p>Для подтверждения позвоните нам:</p>
            <span class="phone-num">+7 999 630-33-76</span>
            <button class="btn" style="width: auto; padding: 5px 20px; border-radius: 10px;" onclick="closeCart()">Ок</button>
        </div>
    </div>

    <script>
        let cart = {};

        // Логика говорящей пчелы
        const phrases = ["Привет!", "Уже определился с покупками?", "Покупай!"];
        const bubble = document.getElementById('bee-bubble');
        const sound = document.getElementById('bee-sound');

        function beeSpeak() {
            // Выбираем фразу
            bubble.innerText = phrases[Math.floor(Math.random() * phrases.length)];
            // Показываем облачко и играем звук
            bubble.style.display = 'block';
            sound.play().catch(e => console.log("Звук сработает после первого клика по сайту"));
            
            // Через 5 секунд убираем
            setTimeout(() => {
                bubble.style.display = 'none';
                // Еще через 5 секунд запускаем снова
                setTimeout(beeSpeak, 5000);
            }, 5000);
        }
        
        // Запуск через 2 секунды после входа
        setTimeout(beeSpeak, 2000);

        function updateCart(name, change) {
            if (!cart[name]) cart[name] = 0;
            cart[name] += change;
            if (cart[name] < 0) cart[name] = 0;
            
            const cards = document.querySelectorAll('.product-card');
            cards.forEach((card, index) => {
                if(`Товар ${index+1}` === name) {
                    document.getElementById(`q-${index+1}`).innerText = cart[name];
                }
            });
        }

        function openCart() {
            const list = document.getElementById('cart-list');
            list.innerHTML = '';
            let hasItems = false;

            for (let item in cart) {
                if (cart[item] > 0) {
                    let li = document.createElement('li');
                    li.innerText = `${item} — ${cart[item]} шт.`;
                    list.appendChild(li);
                    hasItems = true;
                }
            }

            if (!hasItems) list.innerHTML = '<li>Корзина пуста</li>';
            document.getElementById('modal').style.display = 'flex';
        }

        function closeCart() {
            document.getElementById('modal').style.display = 'none';
        }
    </script>
</body>
</html>

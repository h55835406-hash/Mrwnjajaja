<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мёд Алтая — Натуральный продукт</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.css" />
    <style>
        body {
            margin: 0; padding: 0;
            background-color: #fdf5e6;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #5d4037;
            overflow-x: hidden;
            padding-bottom: 80px;
        }

        header {
            width: 100%; height: 120px;
            background: url('https://raw.githubusercontent.com/h55835406-hash/Mrwnjajaja/main/headmed.png') no-repeat center bottom;
            background-size: cover;
            position: sticky; top: 0; z-index: 100;
        }

        /* Кнопка заказа */
        .pay-button-fixed {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            z-index: 999; width: 70px; height: 70px; cursor: pointer;
            filter: drop-shadow(0 4px 10px rgba(0,0,0,0.3));
            transition: 0.3s;
        }

        /* Пчелка и баг с текстом */
        .bee-container { position: fixed; width: 40px; z-index: 99; pointer-events: none; animation: fly-zigzag 15s infinite linear; }
        @keyframes fly-zigzag {
            0% { top: 10%; left: -10%; transform: scaleX(1); }
            50% { top: 10%; left: 110%; transform: scaleX(1); }
            51% { transform: scaleX(-1); }
            100% { top: 10%; left: -10%; transform: scaleX(-1); }
        }
        .bubble {
            position: absolute; bottom: 45px; left: -20px;
            background: white; border: 2px solid #ffa000; border-radius: 10px;
            padding: 5px 10px; font-size: 12px; font-weight: bold;
            display: none; white-space: nowrap; color: #5d4037;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.1);
            transform: scaleX(1) !important; /* Фикс разворота текста */
        }

        /* Красивые алерты */
        #custom-alert {
            display: none; position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            background: #fff; border-left: 5px solid #ffa000; padding: 15px 25px;
            border-radius: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.2); z-index: 2000;
            animation: slideDown 0.4s;
        }
        @keyframes slideDown { from { top: -100px; } to { top: 20px; } }

        /* Островок (Floating Island) */
        #order-island {
            display: none; position: fixed; bottom: 100px; right: 20px;
            background: #ffa000; color: white; padding: 10px 15px;
            border-radius: 50px; cursor: move; z-index: 1001;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3); font-weight: bold;
            font-size: 14px; align-items: center; gap: 8px;
        }

        .catalog { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 20px; }
        .product-card {
            background: #fff; border-radius: 15px; padding: 12px;
            text-align: center; box-shadow: 0 4px 8px rgba(0,0,0,0.05);
            display: flex; flex-direction: column; justify-content: space-between;
        }
        .product-card img { width: 100%; border-radius: 10px; }
        .product-title { font-weight: bold; margin: 5px 0; font-size: 0.9em; }
        .price-tag { color: #ffa000; font-weight: bold; margin: 5px 0; }
        .btn-plus-minus {
            background: #ffa000; color: white; border: none; border-radius: 50%;
            width: 30px; height: 30px; font-size: 20px; font-weight: bold; cursor: pointer;
        }

        #modal {
            display: none; position: fixed; top: 0; left: 0;
            width: 100%; height: 100%; background: rgba(0,0,0,0.7);
            z-index: 1000; justify-content: center; align-items: center;
        }
        .modal-content {
            background: #fff; width: 90%; max-width: 400px; padding: 25px;
            border-radius: 25px; text-align: center; position: relative;
            max-height: 90vh; overflow-y: auto;
        }
        .close-btn { position: absolute; top: 15px; right: 20px; font-size: 28px; cursor: pointer; }
        
        #map { height: 200px; width: 100%; border-radius: 15px; margin: 10px 0; }
        .leaflet-control-attribution { display: none !important; }

        .input-field {
            width: 100%; padding: 12px; border: 2px solid #fdf5e6; border-radius: 12px;
            box-sizing: border-box; font-size: 0.9em; margin-bottom: 10px; outline: none;
            background: #fffaf0;
        }

        .order-btn {
            background: linear-gradient(to right, #4caf50, #45a049);
            color: white; border: none; padding: 15px; border-radius: 15px;
            width: 100%; font-size: 1.1em; font-weight: bold; cursor: pointer;
        }
        .cancel-btn { background: #f44336; color: white; border: none; padding: 10px; border-radius: 12px; width: 100%; cursor: pointer; margin-top: 10px; }
        #cancel-timer { font-size: 0.8em; color: #888; margin-top: 5px; }
    </style>
</head>
<body>

    <div id="custom-alert"></div>
    <div id="order-island" onclick="restoreModal()">📦 Активный заказ <span id="island-timer"></span></div>

    <audio id="bee-sound" src="https://raw.githubusercontent.com/h55835406-hash/Mrwnjajaja/main/Voicy__Hi_%20Roblox.mp3"></audio>

    <div class="bee-container" id="bee-main">
        <div id="bee-bubble" class="bubble"></div>
        <img src="https://raw.githubusercontent.com/h55835406-hash/Mrwnjajaja/main/bee.png" style="width: 100%;">
    </div>

    <header></header>

    <img src="https://raw.githubusercontent.com/h55835406-hash/Mrwnjajaja/main/paybut.png" class="pay-button-fixed" onclick="openCart()">

    <div class="catalog" id="catalog-container"></div>

    <div id="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="minimizeModal()">&times;</span>
            <div id="cart-ui">
                <h3 style="margin:0;">🍯 Оформление заказа</h3>
                <ul id="cart-list" style="list-style:none; padding:0; text-align:left; font-size:0.9em;"></ul>
                <div style="font-size: 0.85em; color: #8d6e63;">Доставка: 500 ₽</div>
                <div class="total-price" id="total-amount" style="font-weight:bold; color:#e65100; margin:10px 0;"></div>
                
                <input type="tel" id="user-phone" class="input-field" placeholder="Ваш номер телефона">
                <div id="map"></div>
                <input type="text" id="address" class="input-field" placeholder="Адрес доставки">
                
                <button class="order-btn" onclick="confirmBeforeSend()">🚀 Подтвердить заказ</button>
            </div>

            <div id="queue-ui" style="display:none;">
                <span style="font-weight:bold; color:#f57c00; font-size:1.2em;">⏳ Заказ отправлен</span>
                <p>Ожидайте ответа в чате Jivo.</p>
                <div id="cancel-section">
                    <button class="cancel-btn" onclick="cancelOrder()">Отменить заказ</button>
                    <div id="cancel-timer">Отмена доступна: <span id="timer-val">05:00</span></div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.js"></script>

    <script>
        const PRICE = 100;
        const DELIVERY = 500;
        const CONFIG_DATA = [
            { id: 1, name: "Горный мёд", img: "https://raw.githubusercontent.com/h55835406-hash/Mrwnjajaja/main/photo.png" },
            { id: 2, name: "Липовый мёд", img: "https://raw.githubusercontent.com/h55835406-hash/Mrwnjajaja/main/photo.png" },
            { id: 3, name: "Гречишный", img: "https://raw.githubusercontent.com/h55835406-hash/Mrwnjajaja/main/photo.png" },
            { id: 4, name: "Таёжный мёд", img: "https://raw.githubusercontent.com/h55835406-hash/Mrwnjajaja/main/photo.png" },
            { id: 5, name: "Мёд в сотах", img: "https://raw.githubusercontent.com/h55835406-hash/Mrwnjajaja/main/photo.png" },
            { id: 6, name: "Донниковый", img: "https://raw.githubusercontent.com/h55835406-hash/Mrwnjajaja/main/photo.png" },
            { id: 7, name: "Акациевый", img: "https://raw.githubusercontent.com/h55835406-hash/Mrwnjajaja/main/photo.png" },
            { id: 8, name: "Цветочный", img: "https://raw.githubusercontent.com/h55835406-hash/Mrwnjajaja/main/photo.png" },
            { id: 9, name: "Мёд с орехами", img: "https://raw.githubusercontent.com/h55835406-hash/Mrwnjajaja/main/photo.png" },
            { id: 10, name: "Эспарцетовый", img: "https://raw.githubusercontent.com/h55835406-hash/Mrwnjajaja/main/photo.png" },
            { id: 11, name: "Дягилевый", img: "https://raw.githubusercontent.com/h55835406-hash/Mrwnjajaja/main/photo.png" },
            { id: 12, name: "Прополис", img: "https://raw.githubusercontent.com/h55835406-hash/Mrwnjajaja/main/photo.png" },
            { id: 13, name: "Перга", img: "https://raw.githubusercontent.com/h55835406-hash/Mrwnjajaja/main/photo.png" },
            { id: 14, name: "Пыльца", img: "https://raw.githubusercontent.com/h55835406-hash/Mrwnjajaja/main/photo.png" },
            { id: 15, name: "Подарочный набор", img: "https://raw.githubusercontent.com/h55835406-hash/Mrwnjajaja/main/photo.png" }
        ];

        let cart = {};
        let isOrderQueued = false;
        let map, marker, cancelTimeout, timerInterval;
        let timeLeft = 300;

        // Рендер
        const container = document.getElementById('catalog-container');
        CONFIG_DATA.forEach(p => {
            container.innerHTML += `
                <div class="product-card">
                    <img src="${p.img}">
                    <div class="product-title">${p.name}</div>
                    <div class="price-tag">${PRICE} ₽</div>
                    <div class="controls">
                        <button class="btn-plus-minus" onclick="updateCart('${p.name}', -1, ${p.id})">-</button>
                        <span id="q-${p.id}">0</span>
                        <button class="btn-plus-minus" onclick="updateCart('${p.name}', 1, ${p.id})">+</button>
                    </div>
                </div>`;
        });

        function showA(txt) {
            const el = document.getElementById('custom-alert');
            el.innerText = txt; el.style.display = 'block';
            setTimeout(() => el.style.display = 'none', 3000);
        }

        function updateCart(n, c, i) {
            if(isOrderQueued) return;
            cart[n] = (cart[n] || 0) + c;
            if (cart[n] < 0) cart[n] = 0;
            document.getElementById(`q-${i}`).innerText = cart[n];
        }

        // Фикс текста пчелки
        const phrases = ["Привет!", "Уже выбрал мёд?", "Покупай!"];
        const bubble = document.getElementById('bee-bubble');
        const sound = document.getElementById('bee-sound');
        function beeSpeak() {
            bubble.innerText = phrases[Math.floor(Math.random() * phrases.length)];
            bubble.style.display = 'block';
            sound.play().catch(() => {});
            setTimeout(() => { bubble.style.display = 'none'; setTimeout(beeSpeak, 5000); }, 5000);
        }
        setTimeout(beeSpeak, 2000);

        function initMap() {
            if (!map) {
                map = L.map('map').setView([53.3, 83.7], 11); 
                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
                L.Control.geocoder({ defaultMarkGeocode: false }).on('markgeocode', function(e) {
                    if (marker) map.removeLayer(marker);
                    marker = L.marker(e.geocode.center).addTo(map);
                    map.fitBounds(e.geocode.bbox);
                    document.getElementById('address').value = e.geocode.name;
                }).addTo(map);
                map.on('click', async (e) => {
                    if (marker) map.removeLayer(marker);
                    marker = L.marker(e.latlng).addTo(map);
                    const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${e.latlng.lat}&lon=${e.latlng.lng}&accept-language=ru`);
                    const data = await res.json();
                    document.getElementById('address').value = data.display_name || "Точка на карте";
                });
            }
            setTimeout(() => map.invalidateSize(), 200);
        }

        function openCart() {
            if(isOrderQueued) return restoreModal();
            const list = document.getElementById('cart-list');
            list.innerHTML = '';
            let total = 0, empty = true;
            for (let item in cart) {
                if (cart[item] > 0) {
                    list.innerHTML += `<li>${item}: <b>${cart[item]} шт.</b></li>`;
                    total += cart[item] * PRICE;
                    empty = false;
                }
            }
            if (empty) return showA("🛒 Ваша корзина пуста!");
            document.getElementById('total-amount').innerText = `Итого: ${total + DELIVERY} ₽`;
            document.getElementById('modal').style.display = 'flex';
            initMap();
        }

        function confirmBeforeSend() {
            const phone = document.getElementById('user-phone').value;
            const addr = document.getElementById('address').value;
            if(!phone || phone.length < 5) return showA("📞 Введите корректный номер!");
            if(!addr) return showA("📍 Укажите адрес доставки!");
            
            if(confirm("Вы уверены, что хотите оформить заказ?")) {
                sendOrder(phone, addr);
            }
        }

        function sendOrder(phone, addr) {
            let info = `🐝 ЗАКАЗ:\n📞 Тел: ${phone}\n📍 Адрес: ${addr}\n🛒 Состав:\n`;
            for (let i in cart) if(cart[i]>0) info += `- ${i}: ${cart[i]}шт.\n`;
            info += `💰 ${document.getElementById('total-amount').innerText}`;

            if (window.jivo_api) {
                jivo_api.sendMessage(info);
                startTimer();
                isOrderQueued = true;
                document.getElementById('cart-ui').style.display = 'none';
                document.getElementById('queue-ui').style.display = 'block';
            } else { showA("Чат еще не загрузился..."); }
        }

        function startTimer() {
            timeLeft = 300;
            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                timeLeft--;
                let m = Math.floor(timeLeft / 60);
                let s = timeLeft % 60;
                let str = `${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
                document.getElementById('timer-val').innerText = str;
                document.getElementById('island-timer').innerText = `(${str})`;
                if(timeLeft <= 0) {
                    clearInterval(timerInterval);
                    document.getElementById('cancel-section').style.display = 'none';
                }
            }, 1000);
        }

        function minimizeModal() {
            document.getElementById('modal').style.display = 'none';
            if(isOrderQueued) {
                document.getElementById('order-island').style.display = 'flex';
            }
        }

        function restoreModal() {
            document.getElementById('modal').style.display = 'flex';
            document.getElementById('order-island').style.display = 'none';
        }

        function cancelOrder() {
            if(confirm("Отменить заказ?")) {
                if (window.jivo_api) jivo_api.sendMessage("❌ Отмена заказа");
                isOrderQueued = false; 
                cart = {};
                CONFIG_DATA.forEach(p => document.getElementById(`q-${p.id}`).innerText = "0");
                clearInterval(timerInterval);
                document.getElementById('order-island').style.display = 'none';
                document.getElementById('modal').style.display = 'none';
                document.getElementById('cart-ui').style.display = 'block';
                document.getElementById('queue-ui').style.display = 'none';
                document.getElementById('cancel-section').style.display = 'block';
                showA("Заказ отменен!");
            }
        }

        // Перетаскивание островка
        const island = document.getElementById("order-island");
        let active = false, curX, curY, initialX, initialY, xOffset = 0, yOffset = 0;
        island.addEventListener("touchstart", dragStart, false);
        island.addEventListener("touchend", dragEnd, false);
        island.addEventListener("touchmove", drag, false);
        function dragStart(e) { initialX = e.touches[0].clientX - xOffset; initialY = e.touches[0].clientY - yOffset; active = true; }
        function dragEnd() { active = false; }
        function drag(e) {
            if (active) {
                e.preventDefault();
                curX = e.touches[0].clientX - initialX; curY = e.touches[0].clientY - initialY;
                xOffset = curX; yOffset = curY;
                island.style.transform = "translate3d(" + curX + "px, " + curY + "px, 0)";
            }
        }
    </script>
    <script src="//code.jivo.ru/widget/Z195zgvWNH" async></script>
</body>
</html>
